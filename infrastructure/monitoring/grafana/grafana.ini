[server]
domain = grafana.barmagly.com
root_url = https://grafana.barmagly.com
serve_from_sub_path = false

[security]
admin_user = admin
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
secret_key = ${GF_SECURITY_SECRET_KEY}
disable_gravatar = true
cookie_secure = true
cookie_samesite = strict

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[users]
allow_sign_up = false
allow_org_create = false
default_theme = dark

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/api-dashboard.json

[alerting]
enabled = true
execute_alerts = true

[smtp]
enabled = true
host = ${SMTP_HOST}:587
user = ${SMTP_USER}
password = ${SMTP_PASSWORD}
from_address = alerts@barmagly.com
from_name = Barmagly Alerts

[log]
mode = console
level = info

[analytics]
reporting_enabled = false
check_for_updates = false
