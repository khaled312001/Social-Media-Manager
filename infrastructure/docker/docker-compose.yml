version: '3.9'

name: barmagly-dev

services:
  # ─── Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - barmagly
    restart: unless-stopped

  # ─── Backend API (NestJS) ────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3001"
      - "9229:9229"  # debugger
    volumes:
      - ../../apps/api:/app
      - /app/node_modules
    env_file:
      - ../../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - barmagly
    restart: unless-stopped
    command: pnpm run start:debug

  # ─── Frontend (Next.js) ─────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ../../apps/web/.env
    depends_on:
      - api
    networks:
      - barmagly
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: barmagly
      POSTGRES_PASSWORD: barmagly_dev_secret
      POSTGRES_DB: barmagly
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barmagly -d barmagly"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barmagly
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass barmagly_redis_secret
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "barmagly_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barmagly
    restart: unless-stopped

  # ─── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.0
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=barmagly_es_secret
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:barmagly_es_secret http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - barmagly
    restart: unless-stopped

  # ─── Kibana ──────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.16.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=barmagly_es_secret
      - xpack.security.enabled=true
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - barmagly
    restart: unless-stopped

  # ─── MinIO (S3-compatible local storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"  # console
    environment:
      MINIO_ROOT_USER: barmagly_minio
      MINIO_ROOT_PASSWORD: barmagly_minio_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - barmagly
    restart: unless-stopped

  # ─── MailHog (Email testing) ──────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - barmagly
    restart: unless-stopped

  # ─── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - barmagly
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=barmagly_grafana_secret
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - barmagly
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  barmagly:
    driver: bridge
