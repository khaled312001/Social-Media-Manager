version: '3.9'

name: barmagly-prod

services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: production
    image: barmagly/api:${TAG:-latest}
    environment:
      NODE_ENV: production
    env_file:
      - ../../apps/api/.env.production
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - barmagly_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: production
    image: barmagly/web:${TAG:-latest}
    environment:
      NODE_ENV: production
    env_file:
      - ../../apps/web/.env.production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - barmagly_prod

networks:
  barmagly_prod:
    driver: overlay
