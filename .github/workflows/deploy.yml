name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/barmagly

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy API
        run: |
          kubectl set image deployment/barmagly-api \
            api=${{ env.IMAGE_PREFIX }}-api:${{ github.ref_name }} \
            -n barmagly-prod
          kubectl rollout status deployment/barmagly-api -n barmagly-prod

      - name: Deploy Web
        run: |
          kubectl set image deployment/barmagly-web \
            web=${{ env.IMAGE_PREFIX }}-web:${{ github.ref_name }} \
            -n barmagly-prod
          kubectl rollout status deployment/barmagly-web -n barmagly-prod

      - name: Run DB Migrations
        run: |
          kubectl exec -n barmagly-prod \
            $(kubectl get pods -n barmagly-prod -l app=barmagly-api -o name | head -1) \
            -- node -e "require('./dist/prisma-migrate')"
