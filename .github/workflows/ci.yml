name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build --filter=@barmagly/shared

  # ─── Backend Tests ──────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: barmagly_test
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: barmagly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter api prisma generate
        env:
          DATABASE_URL: postgresql://barmagly_test:test_secret@localhost:5432/barmagly_test
      - name: Run Migrations
        run: pnpm --filter api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://barmagly_test:test_secret@localhost:5432/barmagly_test
      - name: Run Unit Tests
        run: pnpm --filter api test --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://barmagly_test:test_secret@localhost:5432/barmagly_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_minimum_32_chars
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_32chars
          ENCRYPTION_KEY: test_encryption_key_must_be_32_chars
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage/lcov.info
          flags: api

  # ─── Frontend Tests ─────────────────────────────────────────────
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web test
      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ─── E2E Tests ──────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run E2E Tests
        run: pnpm --filter web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
